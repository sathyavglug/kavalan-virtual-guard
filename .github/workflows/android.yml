name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm run build
          mkdir -p dist

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android Platform
        working-directory: ./frontend
        run: |
          npx cap sync android || (npx cap add android && npx cap sync android)

      - name: Fix Line Endings & Permissions
        working-directory: ./frontend/android
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Build Android APK
        working-directory: ./frontend/android
        run: |
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kavalan-app-debug
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}.${{ github.run_attempt }}
          name: KAVALAN Release v${{ github.run_number }}
          draft: false
          prerelease: false
          files: frontend/android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
